<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>휴텍씨 메뉴얼 검색 시스템</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f5f5f5; color: #333; }

    .header {
      background: #1a237e; color: white; padding: 14px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .subtitle { font-size: 12px; opacity: 0.7; }

    .container { display: flex; height: calc(100vh - 50px); }

    /* Sidebar */
    .sidebar {
      width: 260px; background: white; border-right: 1px solid #ddd;
      overflow-y: auto; flex-shrink: 0; font-size: 13px;
    }
    .axis-group {
      border-bottom: 1px solid #eee; padding: 10px 14px;
    }
    .axis-title {
      font-size: 12px; font-weight: 700; color: #1a237e;
      margin-bottom: 6px; letter-spacing: 0.5px;
    }
    .filter-row { margin-bottom: 4px; }
    .filter-row label { display: block; font-size: 11px; color: #888; margin-bottom: 2px; }
    .filter-row select {
      width: 100%; padding: 4px 6px; border: 1px solid #ddd; border-radius: 3px;
      font-size: 12px; background: white;
    }
    .filter-actions { padding: 10px 14px; }
    .btn {
      padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;
      font-size: 12px; transition: background 0.2s;
    }
    .btn-primary { background: #1a237e; color: white; }
    .btn-primary:hover { background: #283593; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #bdbdbd; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Search Bar */
    .search-bar {
      padding: 12px 16px; background: white; border-bottom: 1px solid #ddd;
      display: flex; gap: 8px;
    }
    .search-bar input {
      flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px;
      font-size: 13px; outline: none;
    }
    .search-bar input:focus { border-color: #1a237e; }
    .search-hint { font-size: 11px; color: #999; padding: 2px 16px 0; background: white; }

    /* Content Area */
    .content { flex: 1; display: flex; overflow: hidden; }

    /* Manual List */
    .manual-list { width: 45%; overflow-y: auto; border-right: 1px solid #ddd; }
    .list-header {
      display: grid; grid-template-columns: 100px 80px 1fr;
      padding: 8px 12px; background: #f0f0f0; border-bottom: 1px solid #ddd;
      font-size: 11px; font-weight: 600; color: #666;
    }
    .manual-item {
      display: grid; grid-template-columns: 100px 80px 1fr;
      padding: 10px 12px; border-bottom: 1px solid #eee;
      cursor: pointer; transition: background 0.15s; font-size: 12px;
    }
    .manual-item:hover { background: #e8eaf6; }
    .manual-item.active { background: #c5cae9; }
    .col-a { color: #1a237e; font-weight: 500; }
    .col-b { color: #e65100; font-size: 11px; }
    .col-title { color: #333; }
    .col-tags { margin-top: 3px; }
    .tag {
      display: inline-block; padding: 1px 5px; margin: 1px;
      background: #e8eaf6; color: #1a237e; border-radius: 3px; font-size: 10px;
    }
    .tag.legacy { background: #fff3e0; color: #e65100; }
    .empty-state { padding: 24px; text-align: center; color: #999; font-size: 13px; }

    /* Manual Viewer */
    .manual-viewer { width: 55%; overflow-y: auto; padding: 20px; background: white; }
    .manual-viewer .placeholder {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #999; font-size: 14px;
    }
    .viewer-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #1a237e; }
    .viewer-meta {
      font-size: 11px; color: #666; margin-bottom: 14px;
      padding: 10px; background: #f9f9f9; border-radius: 6px; line-height: 1.8;
    }
    .viewer-meta strong { color: #333; }
    .viewer-body { font-size: 13px; line-height: 1.7; }
    .viewer-body h1 { font-size: 18px; margin: 14px 0 6px; color: #1a237e; }
    .viewer-body h2 { font-size: 15px; margin: 12px 0 5px; color: #333; }
    .viewer-body h3 { font-size: 13px; margin: 10px 0 4px; color: #555; }
    .viewer-body ul, .viewer-body ol { padding-left: 20px; margin: 4px 0; }
    .viewer-body li { margin: 2px 0; }
    .viewer-body table { border-collapse: collapse; margin: 6px 0; width: 100%; }
    .viewer-body th, .viewer-body td {
      border: 1px solid #ddd; padding: 5px 8px; text-align: left; font-size: 12px;
    }
    .viewer-body th { background: #f5f5f5; }
    .viewer-body code { background: #f5f5f5; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .viewer-body pre {
      background: #263238; color: #eee; padding: 10px; border-radius: 5px;
      overflow-x: auto; margin: 6px 0; font-size: 12px;
    }
    .viewer-body pre code { background: none; color: inherit; }

    /* Q&A Panel */
    .qa-panel {
      background: white; border-top: 1px solid #ddd;
      display: flex; flex-direction: column; height: 220px;
    }
    .qa-header {
      padding: 8px 16px; background: #1a237e; color: white;
      font-size: 13px; font-weight: 500;
      display: flex; justify-content: space-between; align-items: center;
    }
    .qa-messages { flex: 1; overflow-y: auto; padding: 10px 16px; }
    .qa-msg {
      margin-bottom: 8px; padding: 8px 12px; border-radius: 8px;
      font-size: 12px; line-height: 1.6; max-width: 85%;
    }
    .qa-msg.user { background: #e8eaf6; margin-left: auto; text-align: right; }
    .qa-msg.ai { background: #f5f5f5; }
    .qa-msg.system { background: #fff3e0; color: #e65100; text-align: center; max-width: 100%; font-size: 11px; }
    .qa-input {
      display: flex; gap: 8px; padding: 8px 16px; border-top: 1px solid #eee;
    }
    .qa-input input {
      flex: 1; padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px;
      font-size: 12px; outline: none;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>휴텍씨 메뉴얼 검색 시스템</h1>
    <div class="subtitle">5축 필터 (A분야 / B급수 / C홈페이지 / D부서 / E등급) + AI Q&A</div>
  </div>
</div>

<div class="container">
  <!-- Sidebar: 5-Axis Filters -->
  <div class="sidebar">
    <div class="axis-group">
      <div class="axis-title">A. 분야</div>
      <div class="filter-row">
        <label>대분류</label>
        <select id="a-large" onchange="applyFilters()"><option value="">전체</option></select>
      </div>
      <div class="filter-row">
        <label>중분류</label>
        <select id="a-medium" onchange="applyFilters()"><option value="">전체</option></select>
      </div>
    </div>

    <div class="axis-group">
      <div class="axis-title">B. 급수</div>
      <div class="filter-row">
        <label>대분류</label>
        <select id="b-large" onchange="applyFilters()"><option value="">전체</option></select>
      </div>
      <div class="filter-row">
        <label>중분류</label>
        <select id="b-medium" onchange="applyFilters()"><option value="">전체</option></select>
      </div>
      <div class="filter-row">
        <label>소분류</label>
        <select id="b-small" onchange="applyFilters()"><option value="">전체</option></select>
      </div>
    </div>

    <div class="axis-group">
      <div class="axis-title">C. 홈페이지</div>
      <div class="filter-row">
        <label>대분류</label>
        <select id="c-large" onchange="applyFilters()"><option value="">전체</option></select>
      </div>
    </div>

    <div class="axis-group">
      <div class="axis-title">D. 부서</div>
      <div class="filter-row">
        <label>대분류</label>
        <select id="d-large" onchange="applyFilters()"><option value="">전체</option></select>
      </div>
    </div>

    <div class="axis-group">
      <div class="axis-title">E. 등급</div>
      <div class="filter-row">
        <select id="e-grade" onchange="applyFilters()"><option value="">전체</option></select>
      </div>
    </div>

    <div class="filter-actions">
      <button class="btn btn-secondary" onclick="resetFilters()" style="width:100%">필터 초기화</button>
    </div>
  </div>

  <!-- Main Area -->
  <div class="main">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="업무를 설명해보세요 (예: 법률 번역, AI 윤리)" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-primary" onclick="doSearch()">검색</button>
    </div>


    <div class="content">
      <div class="manual-list">
        <div class="list-header">
          <span>A분야</span>
          <span>B급수</span>
          <span>제목</span>
        </div>
        <div id="manual-list-body"></div>
      </div>

      <div class="manual-viewer">
        <div class="placeholder" id="viewer-placeholder">왼쪽 목록에서 메뉴얼을 선택하세요</div>
        <div id="viewer-content" style="display:none">
          <div class="viewer-title" id="viewer-title"></div>
          <div class="viewer-meta" id="viewer-meta"></div>
          <div class="viewer-body" id="viewer-body"></div>
        </div>
      </div>
    </div>

    <div class="qa-panel">
      <div class="qa-header">
        <span>AI Q&A</span>
        <button class="btn" style="background:rgba(255,255,255,0.2);color:white;font-size:11px;padding:3px 8px" onclick="clearQA()">초기화</button>
      </div>
      <div class="qa-messages" id="qa-messages">
        <div class="qa-msg system">메뉴얼을 선택/검색한 뒤 질문하면 해당 내용 기반으로 답변합니다.</div>
      </div>
      <div class="qa-input">
        <input type="text" id="qa-input" placeholder="메뉴얼에 대해 질문하세요..." onkeydown="if(event.key==='Enter')askQuestion()">
        <button class="btn btn-primary" onclick="askQuestion()">질문</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API = '';
  let allManuals = [];
  let currentManualIds = [];
  let currentViewManual = null;

  async function init() {
    const [filterRes, manualRes] = await Promise.all([
      fetch(`${API}/api/filters`).then(r => r.json()),
      fetch(`${API}/api/manuals`).then(r => r.json()),
    ]);
    allManuals = manualRes.manuals;

    // Populate filter dropdowns
    populateSelect('a-large', filterRes['A분야']['대']);
    populateSelect('a-medium', filterRes['A분야']['중']);
    populateSelect('b-large', filterRes['B급수']['대']);
    populateSelect('b-medium', filterRes['B급수']['중']);
    populateSelect('b-small', filterRes['B급수']['소']);
    populateSelect('c-large', filterRes['C홈페이지']['대']);
    populateSelect('d-large', filterRes['D부서']['대']);
    populateSelect('e-grade', filterRes['E등급'] || []);

    renderManualList(allManuals);
  }

  function populateSelect(id, values) {
    const sel = document.getElementById(id);
    const current = sel.value;
    sel.innerHTML = '<option value="">전체</option>';
    values.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      sel.appendChild(opt);
    });
    sel.value = current;
  }

  async function applyFilters() {
    const params = new URLSearchParams();
    const map = {
      'a-large': 'a_large', 'a-medium': 'a_medium',
      'b-large': 'b_large', 'b-medium': 'b_medium', 'b-small': 'b_small',
      'c-large': 'c_large', 'd-large': 'd_large',
    };
    for (const [domId, paramName] of Object.entries(map)) {
      const val = document.getElementById(domId).value;
      if (val) params.set(paramName, val);
    }
    // E등급은 클라이언트 필터
    const res = await fetch(`${API}/api/manuals?${params}`).then(r => r.json());
    let manuals = res.manuals;
    const eGrade = document.getElementById('e-grade').value;
    if (eGrade) {
      manuals = manuals.filter(m => m['E등급'] === eGrade);
    }
    allManuals = manuals;
    renderManualList(allManuals);
  }

  function resetFilters() {
    ['a-large','a-medium','b-large','b-medium','b-small','c-large','d-large','e-grade'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('search-input').value = '';
    applyFilters();
  }

  async function doSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) { applyFilters(); return; }
    const res = await fetch(`${API}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    }).then(r => r.json());
    allManuals = res.manuals;
    renderManualList(allManuals);
  }

  function renderManualList(manuals) {
    const body = document.getElementById('manual-list-body');
    currentManualIds = manuals.map(m => m.id);
    if (manuals.length === 0) {
      body.innerHTML = '<div class="empty-state">검색 결과가 없습니다</div>';
      return;
    }
    body.innerHTML = manuals.map(m => `
      <div class="manual-item ${currentViewManual === m.id ? 'active' : ''}" onclick="viewManual('${m.id}')">
        <span class="col-a">${m['A분야']['대']}<br><small style="color:#666">${m['A분야']['중']}</small></span>
        <span class="col-b">${m['B급수']['대']}<br>${m['B급수']['중']} ${m['B급수']['소']}</span>
        <span>
          <div class="col-title">${m.title}</div>
          <div class="col-tags">
            ${m.tags.slice(0,4).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </span>
      </div>
    `).join('');
  }

  async function viewManual(id) {
    currentViewManual = id;
    renderManualList(allManuals);
    const res = await fetch(`${API}/api/manuals/${id}`).then(r => r.json());
    document.getElementById('viewer-placeholder').style.display = 'none';
    document.getElementById('viewer-content').style.display = 'block';
    document.getElementById('viewer-title').textContent = res.title;
    document.getElementById('viewer-meta').innerHTML = `
      <strong>A분야:</strong> ${res['A분야']['대']} > ${res['A분야']['중']} > ${res['A분야']['소']}
      &nbsp;|&nbsp; <strong>B급수:</strong> ${res['B급수']['대']} / ${res['B급수']['중']} / ${res['B급수']['소']}<br>
      <strong>C홈페이지:</strong> ${res['C홈페이지']['대']} (${res['C홈페이지']['세부']})
      &nbsp;|&nbsp; <strong>D부서:</strong> #${res['D부서']['번호']} ${res['D부서']['대']}
      &nbsp;|&nbsp; <strong>E등급:</strong> ${res['E등급']}<br>
      <strong>파일:</strong> ${res.file}
    `;
    document.getElementById('viewer-body').innerHTML = markdownToHtml(res.content);
  }

  function markdownToHtml(md) {
    let html = md;
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/^\|(.+)\|$/gm, (match, content) => {
      const cells = content.split('|').map(c => c.trim());
      return '<tr>' + cells.map(c => {
        if (c.match(/^-+$/)) return null;
        return `<td>${c}</td>`;
      }).filter(Boolean).join('') + '</tr>';
    });
    html = html.replace(/(<tr>.*<\/tr>\n?)+/g, '<table>$&</table>');
    html = html.replace(/<tr>\s*<\/tr>/g, '');
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    html = html.replace(/\n\n/g, '<br><br>');
    return html;
  }

  function addQAMessage(text, type) {
    const div = document.getElementById('qa-messages');
    const msg = document.createElement('div');
    msg.className = `qa-msg ${type}`;
    msg.innerHTML = text;
    div.appendChild(msg);
    div.scrollTop = div.scrollHeight;
  }

  async function askQuestion() {
    const input = document.getElementById('qa-input');
    const question = input.value.trim();
    if (!question) return;
    addQAMessage(question, 'user');
    input.value = '';
    addQAMessage('답변 생성 중...', 'system');
    try {
      const res = await fetch(`${API}/api/qa`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, manual_ids: currentManualIds.slice(0, 5) }),
      }).then(r => {
        if (!r.ok) return r.json().then(e => { throw new Error(e.detail); });
        return r.json();
      });
      const msgs = document.getElementById('qa-messages');
      msgs.removeChild(msgs.lastChild);
      addQAMessage(res.answer.replace(/\n/g, '<br>'), 'ai');
    } catch (e) {
      const msgs = document.getElementById('qa-messages');
      msgs.removeChild(msgs.lastChild);
      addQAMessage(`오류: ${e.message}`, 'system');
    }
  }

  function clearQA() {
    document.getElementById('qa-messages').innerHTML =
      '<div class="qa-msg system">메뉴얼을 선택/검색한 뒤 질문하면 해당 내용 기반으로 답변합니다.</div>';
  }

  init();
</script>
</body>
</html>
