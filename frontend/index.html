<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>휴텍씨 메뉴얼</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f0f1f4;
      --border: #e2e4e9;
      --text: #1a1d27;
      --text-dim: #6b7084;
      --accent: #4f5bd5;
      --accent-soft: rgba(79,91,213,0.08);
      --accent-hover: rgba(79,91,213,0.14);
      --orange: #e07a2f;
      --orange-soft: rgba(224,122,47,0.08);
      --green: #2ba89e;
      --green-soft: rgba(43,168,158,0.08);
      --red: #d94f4f;
      --red-soft: rgba(217,79,79,0.08);
      --purple: #7c5cbf;
      --purple-soft: rgba(124,92,191,0.08);
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Pretendard', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
    .header .badge { font-size: 11px; color: var(--text-dim); background: var(--surface2); padding: 3px 8px; border-radius: 4px; }

    /* ── Layout ── */
    .app { display: flex; height: calc(100vh - 45px); }

    /* ── Sidebar: Chip Filters ── */
    .sidebar {
      width: 300px; border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px; flex-shrink: 0;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .axis {
      margin-bottom: 20px;
    }
    .axis-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .axis-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-dim);
    }
    .axis-line { flex: 1; height: 1px; background: var(--border); }

    .chip-group {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px;
    }
    .chip-group-label {
      width: 100%; font-size: 10px; color: var(--text-dim); margin-bottom: 2px; margin-top: 4px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 12px; border-radius: 20px; font-size: 12px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }
    .chip .count {
      font-size: 10px; background: var(--surface2); padding: 1px 5px;
      border-radius: 8px; color: var(--text-dim);
    }
    .chip.active .count { background: var(--accent); color: white; }

    /* Active chip uses inline styles from color map */

    .reset-btn {
      width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--text-dim); color: var(--text); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Search */
    .search-wrap { padding: 16px; border-bottom: 1px solid var(--border); }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0 12px; transition: border-color 0.15s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-icon { color: var(--text-dim); font-size: 14px; }
    .search-box input {
      flex: 1; padding: 10px 0; background: transparent; border: none;
      color: var(--text); font-size: 13px; outline: none;
    }
    .search-box input::placeholder { color: var(--text-dim); }

    /* Active filters bar */
    .active-filters {
      display: flex; flex-wrap: wrap; gap: 4px; padding: 0 16px 10px;
    }
    .active-filter-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
    }
    /* Active filter tag colors from inline styles */
    .active-filter-tag .x { opacity: 0.6; }
    .active-filter-tag:hover .x { opacity: 1; }

    /* Results info */
    .results-info {
      padding: 6px 16px; font-size: 11px; color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    /* Content */
    .content { flex: 1; display: flex; overflow: hidden; }

    /* Card List */
    .card-list { width: 45%; overflow-y: auto; padding: 8px; }
    .card-list::-webkit-scrollbar { width: 4px; }
    .card-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .card {
      padding: 14px 16px; margin-bottom: 6px; border-radius: var(--radius);
      border: 1px solid transparent; cursor: pointer; transition: all 0.15s;
    }
    .card:hover { background: var(--surface); border-color: var(--border); }
    .card.active { background: var(--surface); border-color: var(--accent); }
    .card-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .card-meta {
      display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px;
    }
    .card-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 500;
    }
    /* Badge colors from inline styles */
    .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .card-tag {
      font-size: 10px; color: var(--text-dim); padding: 1px 6px;
      border: 1px solid var(--border); border-radius: 3px;
    }
    .empty { padding: 40px; text-align: center; color: var(--text-dim); font-size: 13px; }

    /* Viewer */
    .viewer {
      width: 55%; overflow-y: auto; border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .viewer::-webkit-scrollbar { width: 4px; }
    .viewer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .viewer-placeholder {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 13px;
    }
    .viewer-content { padding: 24px; display: none; }
    .viewer-content.show { display: block; }
    .viewer-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    .viewer-axes {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px; margin-bottom: 20px;
    }
    .viewer-axis-card {
      padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface);
    }
    .viewer-axis-label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
    .viewer-axis-value { font-size: 13px; font-weight: 500; }
    /* Viewer axis colors from inline styles */

    .viewer-body { font-size: 14px; line-height: 1.8; color: var(--text); }
    .viewer-body h1 { font-size: 18px; margin: 20px 0 8px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .viewer-body h2 { font-size: 15px; margin: 16px 0 6px; color: var(--text); }
    .viewer-body h3 { font-size: 14px; margin: 12px 0 4px; color: var(--text-dim); }
    .viewer-body ul, .viewer-body ol { padding-left: 20px; margin: 6px 0; }
    .viewer-body li { margin: 3px 0; }
    .viewer-body strong { color: var(--text); }
    .viewer-body table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .viewer-body th, .viewer-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 13px; }
    .viewer-body th { background: var(--surface2); }
    .viewer-body code { background: var(--surface2); padding: 2px 6px; border-radius: 3px; font-size: 12px; color: var(--accent); }
    .viewer-body pre { background: #1e2130; padding: 14px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
    .viewer-body pre code { background: none; color: #e4e6ed; }

    /* ── Q&A ── */
    .qa {
      border-top: 1px solid var(--border); display: flex; flex-direction: column;
      height: 200px; background: var(--surface2);
    }
    .qa-header {
      padding: 8px 16px; border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 600; color: var(--text-dim);
      display: flex; justify-content: space-between; align-items: center;
    }
    .qa-clear { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 11px; }
    .qa-clear:hover { color: var(--text); }
    .qa-messages { flex: 1; overflow-y: auto; padding: 10px 16px; }
    .qa-msg {
      margin-bottom: 8px; padding: 8px 12px; border-radius: var(--radius);
      font-size: 12px; line-height: 1.6; max-width: 80%;
    }
    .qa-msg.user { background: var(--accent-soft); color: var(--accent); margin-left: auto; text-align: right; }
    .qa-msg.ai { background: var(--surface); color: var(--text); }
    .qa-msg.system { background: var(--surface); color: var(--text-dim); text-align: center; max-width: 100%; font-size: 11px; }
    .qa-input-wrap {
      display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border);
    }
    .qa-input-wrap input {
      flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 12px; outline: none;
    }
    .qa-input-wrap input:focus { border-color: var(--accent); }
    .qa-btn {
      padding: 8px 16px; background: var(--accent); color: white; border: none;
      border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 500;
    }
    .qa-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

<div class="header">
  <h1>휴텍씨 메뉴얼</h1>
  <span class="badge" id="total-count">0개 메뉴얼</span>
</div>

<div class="app">
  <!-- Sidebar: Chip-based filters -->
  <div class="sidebar" id="sidebar"></div>

  <!-- Main -->
  <div class="main">
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="search-input" placeholder="업무를 설명해보세요 (예: 법률 번역, AI 윤리, 음성 더빙)" onkeydown="if(event.key==='Enter')doSearch()">
      </div>
    </div>
    <div class="active-filters" id="active-filters"></div>
    <div class="results-info" id="results-info"></div>

    <div class="content">
      <div class="card-list" id="card-list"></div>
      <div class="viewer">
        <div class="viewer-placeholder" id="viewer-placeholder">메뉴얼을 선택하세요</div>
        <div class="viewer-content" id="viewer-content">
          <div class="viewer-title" id="viewer-title"></div>
          <div class="viewer-axes" id="viewer-axes"></div>
          <div class="viewer-body" id="viewer-body"></div>
        </div>
      </div>
    </div>

    <div class="qa">
      <div class="qa-header">
        <span>AI Q&A</span>
        <button class="qa-clear" onclick="clearQA()">초기화</button>
      </div>
      <div class="qa-messages" id="qa-messages">
        <div class="qa-msg system">메뉴얼 기반 AI 질답 — 검색 후 질문하세요</div>
      </div>
      <div class="qa-input-wrap">
        <input type="text" id="qa-input" placeholder="질문을 입력하세요..." onkeydown="if(event.key==='Enter')askQuestion()">
        <button class="qa-btn" onclick="askQuestion()">전송</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let allManuals = [];
let filteredManuals = [];
let currentViewId = null;
let currentManualIds = [];
let colorMap = {};

const activeFilters = {};

const AXES = [
  { key: 'A분야', label: 'A. 분야', levels: ['대', '중'] },
  { key: 'B급수', label: 'B. 급수', levels: ['대', '중', '소'] },
  { key: 'C홈페이지', label: 'C. 홈페이지', levels: ['대'] },
  { key: 'D부서', label: 'D. 부서', levels: ['대'] },
  { key: 'E등급', label: 'E. 등급', levels: null },
];

const DEFAULT_COLOR = { bg: '#f0f1f4', fg: '#4b5060', border: '#d0d3db' };

function getColor(axisKey, level, value) {
  if (axisKey === 'E등급') return colorMap['E등급']?.[value] || DEFAULT_COLOR;
  return colorMap[axisKey]?.[level]?.[value] || DEFAULT_COLOR;
}

function colorStyle(c, active) {
  if (active) return `background:${c.bg};color:${c.fg};border-color:${c.fg}`;
  return `border-color:${c.border}`;
}

function badgeStyle(c) {
  return `background:${c.bg};color:${c.fg}`;
}

async function init() {
  const [res, colors] = await Promise.all([
    fetch(`${API}/api/manuals`).then(r => r.json()),
    fetch(`${API}/api/colors`).then(r => r.json()),
  ]);
  allManuals = res.manuals;
  filteredManuals = [...allManuals];
  colorMap = colors;
  document.getElementById('total-count').textContent = `${allManuals.length}개 메뉴얼`;
  buildSidebar();
  renderList();
}

// ── Sidebar ──
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';

  for (const axis of AXES) {
    html += `<div class="axis">`;
    html += `<div class="axis-header"><span class="axis-label">${axis.label}</span><div class="axis-line"></div></div>`;

    if (axis.levels) {
      for (const level of axis.levels) {
        const values = getUniqueValues(axis.key, level);
        if (values.length === 0) continue;
        if (axis.levels.length > 1) {
          const levelLabel = level === '대' ? '대분류' : level === '중' ? '중분류' : '소분류';
          html += `<div class="chip-group-label">${levelLabel}</div>`;
        }
        html += `<div class="chip-group">`;
        for (const val of values) {
          const fkey = `${axis.key}.${level}`;
          const count = countManuals(axis.key, level, val);
          const isActive = activeFilters[fkey] === val;
          const c = getColor(axis.key, level, val);
          html += `<button class="chip ${isActive ? 'active' : ''}" style="${colorStyle(c, isActive)}" onclick="toggleFilter('${fkey}','${val}')" data-filter="${fkey}" data-value="${val}" data-axis="${axis.key}" data-level="${level}">
            ${val} <span class="count" ${isActive ? `style="background:${c.fg};color:white"` : ''}>${count}</span>
          </button>`;
        }
        html += `</div>`;
      }
    } else {
      const values = getUniqueE();
      if (values.length > 0) {
        html += `<div class="chip-group">`;
        for (const val of values) {
          const fkey = 'E등급';
          const count = allManuals.filter(m => m['E등급'] === val).length;
          const isActive = activeFilters[fkey] === val;
          const c = getColor('E등급', null, val);
          html += `<button class="chip ${isActive ? 'active' : ''}" style="${colorStyle(c, isActive)}" onclick="toggleFilter('${fkey}','${val}')" data-filter="${fkey}" data-value="${val}" data-axis="E등급" data-level="">
            ${val} <span class="count" ${isActive ? `style="background:${c.fg};color:white"` : ''}>${count}</span>
          </button>`;
        }
        html += `</div>`;
      }
    }
    html += `</div>`;
  }

  html += `<button class="reset-btn" onclick="resetFilters()">필터 초기화</button>`;
  sidebar.innerHTML = html;
}

function getUniqueValues(axisKey, level) {
  const vals = new Set();
  allManuals.forEach(m => {
    const v = m[axisKey]?.[level];
    if (v && v !== '-') vals.add(v);
  });
  return [...vals].sort();
}

function getUniqueE() {
  const vals = new Set();
  allManuals.forEach(m => {
    const v = m['E등급'];
    if (v && v !== '-') vals.add(v);
  });
  return [...vals].sort();
}

function countManuals(axisKey, level, value) {
  return allManuals.filter(m => m[axisKey]?.[level] === value).length;
}

// ── Filtering ──
function toggleFilter(fkey, value) {
  if (activeFilters[fkey] === value) {
    delete activeFilters[fkey];
  } else {
    activeFilters[fkey] = value;
  }
  applyFilters();
}

function applyFilters() {
  filteredManuals = allManuals.filter(m => {
    for (const [fkey, value] of Object.entries(activeFilters)) {
      if (fkey === 'E등급') {
        if (m['E등급'] !== value) return false;
      } else {
        const [axis, level] = fkey.split('.');
        if (m[axis]?.[level] !== value) return false;
      }
    }
    return true;
  });
  renderActiveFilters();
  renderList();
  updateChipStates();
}

function renderActiveFilters() {
  const el = document.getElementById('active-filters');
  const entries = Object.entries(activeFilters);
  if (entries.length === 0) { el.innerHTML = ''; return; }

  el.innerHTML = entries.map(([fkey, value]) => {
    let c;
    if (fkey === 'E등급') {
      c = getColor('E등급', null, value);
    } else {
      const [axis, level] = fkey.split('.');
      c = getColor(axis, level, value);
    }
    return `<span class="active-filter-tag" style="${badgeStyle(c)}" onclick="toggleFilter('${fkey}','${value}')">${value} <span class="x">✕</span></span>`;
  }).join('');
}

function updateChipStates() {
  document.querySelectorAll('.chip').forEach(chip => {
    const fkey = chip.dataset.filter;
    const val = chip.dataset.value;
    const axis = chip.dataset.axis;
    const level = chip.dataset.level;
    const isActive = activeFilters[fkey] === val;
    const c = getColor(axis, level || null, val);
    chip.classList.toggle('active', isActive);
    chip.style.cssText = colorStyle(c, isActive);
    const countEl = chip.querySelector('.count');
    if (countEl) {
      countEl.style.cssText = isActive ? `background:${c.fg};color:white` : '';
    }
  });
}

function resetFilters() {
  for (const key in activeFilters) delete activeFilters[key];
  document.getElementById('search-input').value = '';
  filteredManuals = [...allManuals];
  renderActiveFilters();
  renderList();
  updateChipStates();
}

// ── Search ──
async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) { resetFilters(); return; }
  const res = await fetch(`${API}/api/search`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query }),
  }).then(r => r.json());
  filteredManuals = res.manuals;
  renderList();
}

// ── Card List ──
function renderList() {
  const el = document.getElementById('card-list');
  currentManualIds = filteredManuals.map(m => m.id);
  document.getElementById('results-info').textContent = `${filteredManuals.length}개 결과`;

  if (filteredManuals.length === 0) {
    el.innerHTML = '<div class="empty">결과 없음</div>';
    return;
  }

  el.innerHTML = filteredManuals.map(m => {
    const cA = getColor('A분야', '대', m['A분야']['대']);
    const cB = getColor('B급수', '대', m['B급수']['대']);
    const cC = getColor('C홈페이지', '대', m['C홈페이지']['대']);
    const cD = getColor('D부서', '대', m['D부서']['대']);
    return `
    <div class="card ${currentViewId === m.id ? 'active' : ''}" onclick="viewManual('${m.id}')">
      <div class="card-title">${m.title}</div>
      <div class="card-meta">
        <span class="card-badge" style="${badgeStyle(cA)}">${m['A분야']['대']} · ${m['A분야']['중']}</span>
        <span class="card-badge" style="${badgeStyle(cB)}">${m['B급수']['대']} ${m['B급수']['중']} ${m['B급수']['소']}</span>
        ${m['C홈페이지']['대'] !== '-' ? `<span class="card-badge" style="${badgeStyle(cC)}">${m['C홈페이지']['대']}</span>` : ''}
        <span class="card-badge" style="${badgeStyle(cD)}">${m['D부서']['대']}</span>
      </div>
      <div class="card-tags">${m.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

// ── Viewer ──
async function viewManual(id) {
  currentViewId = id;
  renderList();
  const res = await fetch(`${API}/api/manuals/${id}`).then(r => r.json());

  document.getElementById('viewer-placeholder').style.display = 'none';
  const vc = document.getElementById('viewer-content');
  vc.classList.add('show');
  document.getElementById('viewer-title').textContent = res.title;

  const vA = getColor('A분야', '대', res['A분야']['대']);
  const vB = getColor('B급수', '대', res['B급수']['대']);
  const vC = getColor('C홈페이지', '대', res['C홈페이지']['대']);
  const vD = getColor('D부서', '대', res['D부서']['대']);
  const vE = getColor('E등급', null, res['E등급']);
  document.getElementById('viewer-axes').innerHTML = `
    <div class="viewer-axis-card" style="border-color:${vA.border}">
      <div class="viewer-axis-label">A. 분야</div>
      <div class="viewer-axis-value" style="color:${vA.fg}">${res['A분야']['대']} > ${res['A분야']['중']}${res['A분야']['소'] !== '-' ? ' > ' + res['A분야']['소'] : ''}</div>
    </div>
    <div class="viewer-axis-card" style="border-color:${vB.border}">
      <div class="viewer-axis-label">B. 급수</div>
      <div class="viewer-axis-value" style="color:${vB.fg}">${res['B급수']['대']} / ${res['B급수']['중']} / ${res['B급수']['소']}</div>
    </div>
    <div class="viewer-axis-card" style="border-color:${vC.border}">
      <div class="viewer-axis-label">C. 홈페이지</div>
      <div class="viewer-axis-value" style="color:${vC.fg}">${res['C홈페이지']['대']}${res['C홈페이지']['세부'] !== '-' ? ' · ' + res['C홈페이지']['세부'] : ''}</div>
    </div>
    <div class="viewer-axis-card" style="border-color:${vD.border}">
      <div class="viewer-axis-label">D. 부서</div>
      <div class="viewer-axis-value" style="color:${vD.fg}">#${res['D부서']['번호']} ${res['D부서']['대']}${res['D부서']['중'] !== '-' ? ' · ' + res['D부서']['중'] : ''}</div>
    </div>
    <div class="viewer-axis-card" style="border-color:${vE.border}">
      <div class="viewer-axis-label">E. 등급</div>
      <div class="viewer-axis-value" style="color:${vE.fg}">${res['E등급'] !== '-' ? res['E등급'] : '—'}</div>
    </div>
  `;

  document.getElementById('viewer-body').innerHTML = md(res.content);
}

function md(s) {
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/^\|(.+)\|$/gm, (_, c) => '<tr>' + c.split('|').map(x => x.trim()).filter(x => !x.match(/^-+$/)).map(x => `<td>${x}</td>`).join('') + '</tr>');
  s = s.replace(/(<tr>.*<\/tr>\n?)+/g, '<table>$&</table>');
  s = s.replace(/<tr>\s*<\/tr>/g, '');
  s = s.replace(/^- (.+)$/gm, '<li>$1</li>');
  s = s.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  s = s.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  s = s.replace(/\n\n/g, '<br><br>');
  return s;
}

// ── Q&A ──
function addMsg(text, type) {
  const el = document.getElementById('qa-messages');
  const d = document.createElement('div');
  d.className = `qa-msg ${type}`;
  d.innerHTML = text;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

async function askQuestion() {
  const input = document.getElementById('qa-input');
  const q = input.value.trim();
  if (!q) return;
  addMsg(q, 'user');
  input.value = '';
  addMsg('생각 중...', 'system');
  try {
    const res = await fetch(`${API}/api/qa`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, manual_ids: currentManualIds.slice(0, 5) }),
    }).then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail); }); return r.json(); });
    document.getElementById('qa-messages').removeChild(document.getElementById('qa-messages').lastChild);
    addMsg(res.answer.replace(/\n/g, '<br>'), 'ai');
  } catch (e) {
    document.getElementById('qa-messages').removeChild(document.getElementById('qa-messages').lastChild);
    addMsg(`오류: ${e.message}`, 'system');
  }
}

function clearQA() {
  document.getElementById('qa-messages').innerHTML = '<div class="qa-msg system">메뉴얼 기반 AI 질답 — 검색 후 질문하세요</div>';
}

init();
</script>
